<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Cursos</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <img src="img/logo-ifc.png" alt="Logo IFC">

        <h1>Cadastro de Cursos</h1>

    </header>

    <nav>

        <a href="index.html">Página Principal</a>

        <a href="professores.html">Cadastro de Professores</a>

    </nav>

    <div class="container">

        <button id="addCurso">
            Adicionar Curso
        </button>

        <table id="cursosTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nome do Curso</th>
                    <th>Sigla</th>
                    <th>Coordenador</th>
                    <th>Ações</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <div id="cursoModal" class="modal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <h2>Cadastro de Curso</h2>

            <form id="cursoForm">

                <input type="number"
                       id="id"
                       placeholder="ID"
                       required>

                <input type="text"
                       id="nome"
                       placeholder="Nome do Curso"
                       required>

                <input type="text"
                       id="sigla"
                       placeholder="Sigla"
                       required>

                <textarea id="descricao"
                          placeholder="Descrição do Curso"></textarea>

                <input type="text"
                       id="coordenador"
                       placeholder="Coordenador"
                       required>

                <button type="submit">
                    Salvar
                </button>

            </form>

        </div>

    </div>

    <script src="cursos.js"></script>

</body>

</html>
